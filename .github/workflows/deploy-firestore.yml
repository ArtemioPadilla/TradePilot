name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  pull_request:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:

env:
  FIREBASE_PROJECT: tradepilot-827d1

jobs:
  validate:
    name: Validate Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate rules syntax
        run: |
          firebase --project=${{ env.FIREBASE_PROJECT }} \
            firestore:rules:validate firestore.rules

  deploy:
    name: Deploy Firestore
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: |
          firebase deploy \
            --only firestore:rules \
            --project=${{ env.FIREBASE_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore indexes
        run: |
          firebase deploy \
            --only firestore:indexes \
            --project=${{ env.FIREBASE_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Summary
        run: |
          echo "## Firestore Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ env.FIREBASE_PROJECT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rules:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Indexes:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View in Firebase Console](https://console.firebase.google.com/project/${{ env.FIREBASE_PROJECT }}/firestore)" >> $GITHUB_STEP_SUMMARY
